server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:${EDUSIM_DB_PORT:3307}/edusim?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kuala_Lumpur
    username: ${EDUSIM_DB_USER:edusim}
    password: ${EDUSIM_DB_PASSWORD:1234}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: ${EDUSIM_JWT_SECRET:change-this-to-a-very-long-secure-key-for-edusim-app}
    expiration-minutes: 480
