services:
  mysql:
    image: mysql:8.4
    container_name: edusim-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: edusim
    ports:
      - "3306:3306"
    volumes:
      - edusim_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: ./backend
    container_name: edusim-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/edusim?sslMode=DISABLED&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kuala_Lumpur"
      EDUSIM_DB_HOST: mysql
      EDUSIM_DB_PORT: 3306
      EDUSIM_DB_NAME: edusim
      EDUSIM_DB_USER: root
      EDUSIM_DB_PASSWORD: root
      EDUSIM_DB_SSL_MODE: DISABLED
      EDUSIM_JWT_SECRET: local-development-secret-change-before-production
      EDUSIM_ALLOWED_ORIGIN_PATTERNS: http://localhost:4200,http://127.0.0.1:4200,http://localhost:8080,http://127.0.0.1:8080
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    container_name: edusim-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "4200:80"

volumes:
  edusim_mysql_data:
