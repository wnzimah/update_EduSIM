server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${EDUSIM_DB_HOST:127.0.0.1}:${EDUSIM_DB_PORT:3307}/${EDUSIM_DB_NAME:edusim}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kuala_Lumpur
    username: ${EDUSIM_DB_USER:edusim}
    password: ${EDUSIM_DB_PASSWORD:1234}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: ${EDUSIM_JWT_SECRET:change-this-to-a-very-long-secure-key-for-edusim-app}
    expiration-minutes: 480
  cors:
    allowed-origin-patterns: ${EDUSIM_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200,http://127.0.0.1:4200,http://*:4200}
  ai:
    enabled: ${EDUSIM_AI_ENABLED:true}
    gemini:
      api-key: ${EDUSIM_AI_API_KEY:}
      model: ${EDUSIM_AI_MODEL:gemini-1.5-flash}
      endpoint: "${EDUSIM_AI_ENDPOINT:https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent}"
