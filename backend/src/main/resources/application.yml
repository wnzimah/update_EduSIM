server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:mysql://${EDUSIM_DB_HOST:localhost}:${EDUSIM_DB_PORT:3306}/${EDUSIM_DB_NAME:edusim}?sslMode=${EDUSIM_DB_SSL_MODE:DISABLED}&serverTimezone=Asia/Kuala_Lumpur
    username: ${EDUSIM_DB_USER:root}
    password: ${EDUSIM_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

app:
  jwt:
    secret: ${EDUSIM_JWT_SECRET:change-this-to-a-very-long-secure-key-for-edusim-app}
    expiration-minutes: 480

  cors:
    allowed-origin-patterns: ${EDUSIM_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200,http://127.0.0.1:4200,http://*:4200,https://update-edu-sim.vercel.app}

  ai:
    enabled: ${EDUSIM_AI_ENABLED:true}
    gemini:
      api-key: ${EDUSIM_AI_API_KEY:}
      model: ${EDUSIM_AI_MODEL:gemini-1.5-flash}
      endpoint: "${EDUSIM_AI_ENDPOINT:https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent}"
